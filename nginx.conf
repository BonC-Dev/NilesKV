# NilesKV Nginx Configuration
# Place at: /etc/nginx/sites-available/nileskv
# Then: ln -s /etc/nginx/sites-available/nileskv /etc/nginx/sites-enabled/nileskv

server {
    listen 80;
    listen [::]:80;
    server_name nileskv.me www.nileskv.me;

    # --- Security headers on top of helmet ---
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-Frame-Options           "DENY"            always;
    add_header Referrer-Policy           "no-referrer"     always;

    # --- Block common exploit paths immediately at Nginx level ---
    location ~* \.(php|asp|aspx|jsp|cgi|env|git|htaccess|htpasswd|config)$ {
        return 444;  # Drop connection silently, no response
    }

    # --- Block bots scanning for vulnerabilities ---
    location ~* (wp-admin|wp-login|phpmyadmin|admin|xmlrpc) {
        return 444;
    }

    # --- Limit request body size (backup to Express's 5KB limit) ---
    client_max_body_size 10k;

    # --- Proxy all traffic to Express on port 3000 ---
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Pass real client IP to Express (for rate limiter accuracy)
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Host              $host;

        # Timeouts — kill hanging requests
        proxy_connect_timeout  10s;
        proxy_send_timeout     10s;
        proxy_read_timeout     10s;
    }

    # --- Rate limit at Nginx level too (extra layer) ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
    limit_req zone=api burst=20 nodelay;
}

# HTTPS block is added automatically by Certbot — do not write it manually.
